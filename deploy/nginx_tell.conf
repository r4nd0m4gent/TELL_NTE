# /etc/nginx/sites-available/tell
# Nginx handles SSL, serves tell.html as a static page,
# and proxies the Dash app.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name tell.newtexeco.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tell.newtexeco.nl;

    ssl_certificate     /etc/letsencrypt/live/tell.newtexeco.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tell.newtexeco.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Serve tell.html as the root landing page ──────────────────────────────
    location = / {
        root  /home/tell/app;
        try_files /tell.html =404;
    }

    # ── Dash app at /dashboard/ ───────────────────────────────────────────────
    # NOTE: no trailing slash on proxy_pass — the Dash app uses
    # url_base_pathname='/dashboard/', so it must receive the full /dashboard/
    # path. A trailing slash here strips the prefix and causes 404s.
    location /dashboard/ {
        proxy_pass         http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;

        # Disable caching for Dash JS so Plotly.js always loads fresh
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ── Contribution form at /contribute/ ────────────────────────────────────
    location /contribute/ {
        proxy_pass         http://127.0.0.1:8051/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
