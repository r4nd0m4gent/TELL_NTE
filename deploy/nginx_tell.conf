# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name tell.newtexeco.nl;
    return 301 https://$host$request_uri;
}

# HTTPS — terminate SSL here, proxy to Gunicorn
server {
    listen 443 ssl;
    server_name tell.newtexeco.nl;

    ssl_certificate     /etc/letsencrypt/live/tell.newtexeco.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tell.newtexeco.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Disable caching for Dash JS assets so Plotly always loads fresh
    location ~* \.(js|css)$ {
        proxy_pass         http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-store, no-cache, must-revalidate";
        expires            0;
    }

    # Dashboard (root)
    location / {
        proxy_pass         http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # WebSocket support (needed for Dash live updates)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Contribution form
    location /contribute/ {
        proxy_pass         http://127.0.0.1:8051/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
